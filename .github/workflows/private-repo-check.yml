name: Reusable private-package repository check

on:
  workflow_call:
    inputs:
      profile:
        description: Maintainer-owned private-package repository profile
        type: string
        required: true

permissions:
  contents: read

jobs:
  repo-check:
    name: repo-check
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write # exchange GitHub OIDC for the read-only CodeArtifact role
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate private-package profile
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            seraph|cloudops|atlas) ;;
            *) echo "Unsupported private-package profile: $PROFILE" >&2; exit 2 ;;
          esac

      - name: Validate agent-ready PR execution brief
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          PR_BODY_JSON: ${{ toJSON(github.event.pull_request.body) }}
        run: |
          # BEGIN GENERATED PR BRIEF VALIDATOR
          python3 - <<'PY'
          #!/usr/bin/env python3
          """Fail closed when a pull request execution brief is missing or empty."""

          from __future__ import annotations

          import json
          import os
          import re
          import sys
          from pathlib import Path


          REQUIRED_HEADINGS = (
              "## Intent",
              "## Behavioral contract",
              "## Impact surface",
              "## Risk hypotheses",
              "## Validation path",
              "## Evidence",
              "## Operational changes",
          )

          SCAFFOLD_LINES = {
              "## Behavioral contract": {"Before:", "After:", "Must remain unchanged:"},
              "## Impact surface": {"Primary:", "Adjacent:"},
              "## Validation path": {"Setup:", "Exercise:", "Expected:"},
              "## Evidence": {
                  "- Tests added or updated:",
                  "- Commands run:",
                  "- Existing validation intentionally not run:",
                  "- Screenshots or traces:",
              },
              "## Operational changes": {
                  "- Config or environment variables:",
                  "- Schema or data migration:",
                  "- Permissions or secrets:",
                  "- Rollout or rollback considerations:",
              },
          }

          PLACEHOLDER_LINES = {"-", "*", "+", "1.", "1)"}


          def _visible_body(body: str) -> str:
              return re.sub(r"<!--.*?-->", "", body, flags=re.DOTALL)


          def _sections(body: str) -> tuple[dict[str, list[str]], list[str]]:
              visible = _visible_body(body)
              lines = visible.splitlines()
              positions: dict[str, int] = {}
              errors: list[str] = []

              for heading in REQUIRED_HEADINGS:
                  matches = [index for index, line in enumerate(lines) if line.strip() == heading]
                  if len(matches) != 1:
                      qualifier = "missing" if not matches else "duplicated"
                      errors.append(f"{qualifier} required heading: {heading}")
                  else:
                      positions[heading] = matches[0]

              if errors:
                  return {}, errors

              observed_order = sorted(REQUIRED_HEADINGS, key=positions.__getitem__)
              if tuple(observed_order) != REQUIRED_HEADINGS:
                  return {}, ["required headings are out of order"]

              sections: dict[str, list[str]] = {}
              for heading in REQUIRED_HEADINGS:
                  start = positions[heading] + 1
                  end = next(
                      (
                          index
                          for index in range(start, len(lines))
                          if lines[index].startswith("## ")
                      ),
                      len(lines),
                  )
                  sections[heading] = lines[start:end]
              return sections, []


          def validate(body: str) -> list[str]:
              sections, errors = _sections(body)
              if errors:
                  return errors

              for heading, lines in sections.items():
                  scaffold = SCAFFOLD_LINES.get(heading, set())
                  substantive = [
                      line.strip()
                      for line in lines
                      if line.strip()
                      and line.strip() not in scaffold
                      and line.strip() not in PLACEHOLDER_LINES
                  ]
                  if not substantive:
                      errors.append(f"empty required section: {heading}")
              return errors


          def _normalize_transport_newlines(body: str) -> str:
              """Restore reusable-workflow escaped line breaks without touching normal Markdown."""
              if "\n" not in body and r"\n" in body:
                  return body.replace(r"\r\n", "\n").replace(r"\n", "\n").replace(r"\r", "\n")
              return body


          def _pull_request_body() -> str:
              """Read a multiline-safe PR body from the event or the workflow's JSON transport."""
              if event_path := os.environ.get("GITHUB_EVENT_PATH"):
                  payload = json.loads(Path(event_path).read_text(encoding="utf-8"))
                  pull_request = payload.get("pull_request")
                  if isinstance(pull_request, dict) and isinstance(pull_request.get("body"), str):
                      return _normalize_transport_newlines(pull_request["body"])
              if encoded_body := os.environ.get("PR_BODY_JSON"):
                  body = json.loads(encoded_body)
                  if not isinstance(body, str):
                      raise ValueError("PR_BODY_JSON must decode to a string")
                  return _normalize_transport_newlines(body)
              return _normalize_transport_newlines(os.environ.get("PR_BODY", ""))


          def main() -> int:
              errors = validate(_pull_request_body())
              if not errors:
                  print("Agent-ready PR execution brief: PASS")
                  return 0
              for error in errors:
                  print(error, file=sys.stderr)
              return 2


          if __name__ == "__main__":
              raise SystemExit(main())
          PY
          # END GENERATED PR BRIEF VALIDATOR

      - name: Obtain read-only package identity
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::322814813391:role/CloudOpsPackageReaderRole
          aws-region: us-east-1
          retry-max-attempts: 3
          action-timeout-s: 120

      - name: Mint and mask frozen-resolution credential
        run: |
          TOKEN="$(aws codeartifact get-authorization-token --domain cc \
            --domain-owner 322814813391 --region us-east-1 \
            --query authorizationToken --output text)"
          test -n "$TOKEN"
          echo "::add-mask::$TOKEN"
          echo "UV_INDEX_CODEARTIFACT_USERNAME=aws" >> "$GITHUB_ENV"
          echo "UV_INDEX_CODEARTIFACT_PASSWORD=$TOKEN" >> "$GITHUB_ENV"

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install frozen dependencies
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            seraph) uv sync --frozen ;;
            cloudops) uv sync --locked ;;
            atlas) uv sync --frozen --all-extras --dev ;;
          esac

      - name: Run canonical repository gate
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            cloudops) ./check.sh ;;
            *) scripts/check.sh ;;
          esac

      - name: Validate authoritative receipt
        run: scripts/check-status.sh --strict
