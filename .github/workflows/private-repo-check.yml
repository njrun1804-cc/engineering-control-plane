name: Reusable private-package repository check

on:
  workflow_call:
    inputs:
      profile:
        description: Maintainer-owned private-package repository profile
        type: string
        required: true

permissions:
  contents: read

jobs:
  repo-check:
    name: repo-check
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write # exchange GitHub OIDC for the read-only CodeArtifact role
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate private-package profile
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            seraph|cloudops|atlas) ;;
            *) echo "Unsupported private-package profile: $PROFILE" >&2; exit 2 ;;
          esac

      - name: Validate agent-ready PR execution brief
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          required=(
            "## Intent"
            "## Behavioral contract"
            "## Impact surface"
            "## Risk hypotheses"
            "## Validation path"
            "## Evidence"
            "## Operational changes"
          )
          for heading in "${required[@]}"; do
            if ! grep -Fqx "$heading" <<<"$PR_BODY"; then
              echo "Missing required PR execution-brief heading: $heading" >&2
              exit 2
            fi
          done

      - name: Obtain read-only package identity
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::322814813391:role/CloudOpsPackageReaderRole
          aws-region: us-east-1
          retry-max-attempts: 3
          action-timeout-s: 120

      - name: Mint and mask frozen-resolution credential
        run: |
          TOKEN="$(aws codeartifact get-authorization-token --domain cc \
            --domain-owner 322814813391 --region us-east-1 \
            --query authorizationToken --output text)"
          test -n "$TOKEN"
          echo "::add-mask::$TOKEN"
          echo "UV_INDEX_CODEARTIFACT_USERNAME=aws" >> "$GITHUB_ENV"
          echo "UV_INDEX_CODEARTIFACT_PASSWORD=$TOKEN" >> "$GITHUB_ENV"

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install frozen dependencies
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            seraph) uv sync --frozen ;;
            cloudops) uv sync --locked ;;
            atlas) uv sync --frozen --all-extras --dev ;;
          esac

      - name: Run canonical repository gate
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            cloudops) ./check.sh ;;
            *) scripts/check.sh ;;
          esac

      - name: Validate authoritative receipt
        run: scripts/check-status.sh --strict
