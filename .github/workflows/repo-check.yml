name: Reusable repository check

on:
  workflow_call:
    inputs:
      profile:
        description: Maintainer-owned repository execution profile
        type: string
        required: true

permissions:
  contents: read

jobs:
  repo-check:
    name: repo-check
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Validate profile
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            control-plane|warren) ;;
            *) echo "Unsupported centrally owned profile: $PROFILE" >&2; exit 2 ;;
          esac
      - name: Set up uv and Python for Warren
        if: inputs.profile == 'warren'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Set up uv for control-plane audit
        if: inputs.profile == 'control-plane'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: false
      - name: Sync Warren dependencies
        if: inputs.profile == 'warren'
        run: uv sync --frozen --dev
      - name: Run Warren repository gate
        if: inputs.profile == 'warren'
        run: scripts/check.sh
      - name: Validate Warren receipt
        if: inputs.profile == 'warren'
        run: scripts/check-status.sh --strict
      - name: Validate control-plane JSON and YAML
        if: inputs.profile == 'control-plane'
        run: |
          find . -path ./.git -prune -o -name '*.json' -type f -print0 | xargs -0 -r jq empty
          for file in .github/*.yml .github/workflows/*.yml; do
            ruby -e 'require "yaml"; YAML.safe_load(File.read(ARGV[0]), permitted_classes: [], aliases: true)' "$file"
          done
      - name: Audit control-plane workflow security
        if: inputs.profile == 'control-plane'
        run: uvx zizmor==1.28.0 .github/workflows
