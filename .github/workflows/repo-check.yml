name: Reusable repository check

on:
  workflow_call:
    inputs:
      profile:
        description: Maintainer-owned repository execution profile
        type: string
        required: true

permissions:
  contents: read

jobs:
  repo-check:
    name: repo-check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate closed profile
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            control-plane|warren|homenet|bambu|zion|blueprint|lightroom|contracts|eats) ;;
            *) echo "Unsupported centrally owned profile: $PROFILE" >&2; exit 2 ;;
          esac

      - name: Validate agent-ready PR execution brief
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          AGENT_READY_FILE: docs/agent-ready.md
        run: |
          PR_CHANGED_FILES_JSON="$(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
              --jq '.[] | .filename, (.previous_filename // empty)' |
              python3 -c 'import json, sys; print(json.dumps(sys.stdin.read().splitlines()))'
          )"
          export PR_CHANGED_FILES_JSON
          # BEGIN GENERATED PR BRIEF VALIDATOR
          python3 - <<'PY'
          #!/usr/bin/env python3
          """Fail closed when a pull request execution brief lacks executable risk closure."""

          from __future__ import annotations

          import argparse
          import json
          import os
          import re
          import sys
          from pathlib import Path

          REQUIRED_HEADINGS = (
              "## Intent",
              "## Behavioral contract",
              "## Impact surface",
              "## Risk hypotheses",
              "## Validation path",
              "## Evidence",
              "## Operational changes",
          )

          SCAFFOLD_LINES = {
              "## Behavioral contract": {"Before:", "After:", "Must remain unchanged:"},
              "## Impact surface": {"Primary:", "Adjacent:"},
              "## Validation path": {"Setup:", "Exercise:", "Expected:"},
              "## Evidence": {
                  "- Tests added or updated:",
                  "- Commands run:",
                  "- Existing validation intentionally not run:",
                  "- Screenshots or traces:",
              },
              "## Operational changes": {
                  "- Config or environment variables:",
                  "- Schema or data migration:",
                  "- Permissions or secrets:",
                  "- Rollout or rollback considerations:",
              },
          }

          PLACEHOLDER_LINES = {"-", "*", "+", "1.", "1)"}
          DEPENDENCY_RE = re.compile(
              r"^(?P<repo>[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)#(?P<pr>[1-9][0-9]*)"
              r"\s+@\s+(?P<head>[0-9a-f]{40})$"
          )
          HYPOTHESIS_HEADING_RE = re.compile(r"^### Hypothesis ([1-9][0-9]*)$")
          HYPOTHESIS_FIELDS = ("Hypothesis", "Exercise", "Expected", "Pre-push result")
          IMPACT_LABELS = (
              "Primary:",
              "Adjacent:",
              "Direct dependencies:",
              "Downstream consumers:",
          )
          VALIDATION_LABELS = (
              "Setup:",
              "Exercise:",
              "Inputs or state:",
              "Edge case:",
              "Expected:",
              "Forbidden effects:",
          )
          EVIDENCE_LABELS = (
              "- Risk closure:",
              "- Final gate command:",
              "- Runtime artifacts:",
              "- Unverified behavior:",
          )


          def _visible_body(body: str) -> str:
              return re.sub(r"<!--.*?-->", "", body, flags=re.DOTALL)


          def _sections(body: str) -> tuple[dict[str, list[str]], list[str]]:
              visible = _visible_body(body)
              lines = visible.splitlines()
              positions: dict[str, int] = {}
              errors: list[str] = []

              for heading in REQUIRED_HEADINGS:
                  matches = [index for index, line in enumerate(lines) if line.strip() == heading]
                  if len(matches) != 1:
                      qualifier = "missing" if not matches else "duplicated"
                      errors.append(f"{qualifier} required heading: {heading}")
                  else:
                      positions[heading] = matches[0]

              if errors:
                  return {}, errors

              observed_order = sorted(REQUIRED_HEADINGS, key=positions.__getitem__)
              if tuple(observed_order) != REQUIRED_HEADINGS:
                  return {}, ["required headings are out of order"]

              sections: dict[str, list[str]] = {}
              for heading in REQUIRED_HEADINGS:
                  start = positions[heading] + 1
                  end = next(
                      (
                          index
                          for index in range(start, len(lines))
                          if lines[index].startswith("## ")
                      ),
                      len(lines),
                  )
                  sections[heading] = lines[start:end]
              return sections, []


          def _label_blocks(lines: list[str], labels: tuple[str, ...]) -> dict[str, list[str]]:
              positions = {
                  label: next(
                      (
                          index
                          for index, line in enumerate(lines)
                          if line.strip().startswith(label)
                      ),
                      None,
                  )
                  for label in labels
              }
              blocks: dict[str, list[str]] = {}
              for label, position in positions.items():
                  if position is None:
                      blocks[label] = []
                      continue
                  line = lines[position].strip()
                  inline = line[len(label) :].strip()
                  later = [
                      value
                      for value in positions.values()
                      if value is not None and value > position
                  ]
                  end = min(later) if later else len(lines)
                  values = ([inline] if inline else []) + [
                      item.strip().removeprefix("-").strip()
                      for item in lines[position + 1 : end]
                      if item.strip() and item.strip() not in PLACEHOLDER_LINES
                  ]
                  blocks[label] = [item for item in values if item]
              return blocks


          def _hypotheses(lines: list[str]) -> list[dict[str, str]]:
              starts = [
                  (index, int(match.group(1)))
                  for index, line in enumerate(lines)
                  if (match := HYPOTHESIS_HEADING_RE.fullmatch(line.strip()))
              ]
              hypotheses = []
              for offset, (start, number) in enumerate(starts):
                  end = starts[offset + 1][0] if offset + 1 < len(starts) else len(lines)
                  values: dict[str, str] = {"number": str(number)}
                  for line in lines[start + 1 : end]:
                      stripped = line.strip()
                      for field in HYPOTHESIS_FIELDS:
                          prefix = f"{field}:"
                          if stripped.startswith(prefix):
                              values[field] = stripped[len(prefix) :].strip()
                  hypotheses.append(values)
              return hypotheses


          def parse_dependencies(body: str) -> list[dict[str, object]]:
              sections, errors = _sections(body)
              if errors:
                  return []
              blocks = _label_blocks(sections["## Impact surface"], IMPACT_LABELS)
              dependencies = []
              for value in blocks["Direct dependencies:"]:
                  if value.lower() == "none":
                      continue
                  match = DEPENDENCY_RE.fullmatch(value)
                  if match:
                      dependencies.append(
                          {
                              "repository": match.group("repo"),
                              "pull_request": int(match.group("pr")),
                              "head_sha": match.group("head"),
                          }
                      )
              return dependencies


          def risk_result_count(body: str) -> int:
              sections, errors = _sections(body)
              if errors:
                  return 0
              return len(_hypotheses(sections["## Risk hypotheses"]))


          def _is_docs_only(paths: list[str]) -> bool:
              return bool(paths) and all(
                  path == "README.md"
                  or path.endswith(".md")
                  or path.startswith(("docs/", ".github/ISSUE_TEMPLATE/"))
                  for path in paths
              )


          def validate(
              body: str,
              *,
              agent_ready_text: str | None = None,
              changed_files: list[str] | None = None,
          ) -> list[str]:
              sections, errors = _sections(body)
              if errors:
                  return errors

              for heading, lines in sections.items():
                  scaffold = SCAFFOLD_LINES.get(heading, set())
                  substantive = [
                      line.strip()
                      for line in lines
                      if line.strip()
                      and line.strip() not in scaffold
                      and line.strip() not in PLACEHOLDER_LINES
                  ]
                  if not substantive:
                      errors.append(f"empty required section: {heading}")

              impact = _label_blocks(sections["## Impact surface"], IMPACT_LABELS)
              for label in IMPACT_LABELS:
                  if not impact[label]:
                      errors.append(f"missing impact field: {label.removesuffix(':')}")
              for value in impact["Direct dependencies:"]:
                  if value.lower() != "none" and not DEPENDENCY_RE.fullmatch(value):
                      errors.append(f"invalid direct dependency: {value}")

              hypotheses = _hypotheses(sections["## Risk hypotheses"])
              if not 1 <= len(hypotheses) <= 3:
                  errors.append("risk hypotheses must contain one to three entries")
              if [item.get("number") for item in hypotheses] != [
                  str(index) for index in range(1, len(hypotheses) + 1)
              ]:
                  errors.append("risk hypothesis numbering must be contiguous from 1")
              for index, hypothesis in enumerate(hypotheses, start=1):
                  for field in HYPOTHESIS_FIELDS:
                      if not hypothesis.get(field):
                          errors.append(f"hypothesis {index} missing field: {field}")
                  result = hypothesis.get("Pre-push result", "")
                  if result.startswith("pass:") and result.removeprefix("pass:").strip():
                      continue
                  if result == "not applicable: docs-only":
                      if changed_files is not None and not _is_docs_only(changed_files):
                          errors.append(
                              f"hypothesis {index} claims docs-only but code-bearing files changed"
                          )
                      continue
                  if (
                      result.startswith("unavailable:")
                      and result.removeprefix("unavailable:").strip()
                  ):
                      boundary = result.removeprefix("unavailable:").strip()
                      if (
                          agent_ready_text is None
                          or boundary.casefold() not in agent_ready_text.casefold()
                      ):
                          errors.append(
                              f"hypothesis {index} unavailable boundary is not documented"
                          )
                      continue
                  if result:
                      errors.append(f"hypothesis {index} is not closed")
              adjacent = [
                  value
                  for value in impact["Adjacent:"]
                  if value.casefold() not in {"none", "n/a"}
              ]
              if adjacent and len(hypotheses) < 2:
                  errors.append("an adjacent impact requires a second risk hypothesis")

              validation = _label_blocks(sections["## Validation path"], VALIDATION_LABELS)
              for label in VALIDATION_LABELS:
                  if not validation[label]:
                      errors.append(f"missing validation field: {label.removesuffix(':')}")

              evidence = _label_blocks(sections["## Evidence"], EVIDENCE_LABELS)
              for label in EVIDENCE_LABELS:
                  if not evidence[label]:
                      errors.append(
                          f"missing evidence field: {label.removeprefix('- ').removesuffix(':')}"
                      )
              return errors


          def main(argv: list[str] | None = None) -> int:
              parser = argparse.ArgumentParser(description=__doc__)
              parser.add_argument(
                  "--body-file",
                  type=Path,
                  help="validate this body before sending it; CI defaults to PR_BODY",
              )
              parser.add_argument("--agent-ready-file", type=Path)
              args = parser.parse_args(argv)
              try:
                  body = (
                      args.body_file.read_text(encoding="utf-8")
                      if args.body_file is not None
                      else os.environ.get("PR_BODY", "")
                  )
              except OSError as exc:
                  print(f"could not read PR body: {exc}", file=sys.stderr)
                  return 2
              try:
                  agent_ready_file = args.agent_ready_file
                  if agent_ready_file is None and os.environ.get("AGENT_READY_FILE"):
                      agent_ready_file = Path(os.environ["AGENT_READY_FILE"])
                  agent_ready_text = (
                      agent_ready_file.read_text(encoding="utf-8")
                      if agent_ready_file is not None
                      else None
                  )
              except OSError as exc:
                  print(f"could not read agent-ready contract: {exc}", file=sys.stderr)
                  return 2
              changed_files = None
              if os.environ.get("PR_CHANGED_FILES_JSON"):
                  try:
                      value = json.loads(os.environ["PR_CHANGED_FILES_JSON"])
                  except json.JSONDecodeError as exc:
                      print(f"could not parse changed files: {exc}", file=sys.stderr)
                      return 2
                  if not isinstance(value, list) or not all(
                      isinstance(path, str) for path in value
                  ):
                      print("changed files must be a JSON array of strings", file=sys.stderr)
                      return 2
                  changed_files = value
              errors = validate(
                  body,
                  agent_ready_text=agent_ready_text,
                  changed_files=changed_files,
              )
              if not errors:
                  print("Agent-ready PR execution brief: PASS")
                  return 0
              for error in errors:
                  print(error, file=sys.stderr)
              return 2


          if __name__ == "__main__":
              raise SystemExit(main())
          PY
          # END GENERATED PR BRIEF VALIDATOR

      - name: Set up uv and Python
        if: inputs.profile != 'control-plane'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ inputs.profile == 'bambu' && '3.12' || '3.13' }}
          enable-cache: true

      - name: Set up uv for control-plane audit
        if: inputs.profile == 'control-plane'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: false

      - name: Set up Node
        if: contains(fromJSON('["homenet","blueprint","lightroom","eats"]'), inputs.profile)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.profile == 'blueprint' && '25' || '24' }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            eats/package-lock.json
            shell/package-lock.json
            mike/package-lock.json
            nsa/package-lock.json
            vbr/package-lock.json
            cockpit/package-lock.json
            plan/package-lock.json
            status/package-lock.json
            plate/package-lock.json
            thesis/package-lock.json
            vendor/automaat-lightroom-mcp/server/package-lock.json

      - name: Restore pinned Lightroom tools
        if: inputs.profile == 'lightroom'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/stylua
            ~/.luarocks
          key: lightroom-tools-${{ runner.os }}-lua-5.4-stylua-2.5.2-luacheck-1.2.0

      - name: Install profile system tools
        if: contains(fromJSON('["zion","blueprint","lightroom","eats"]'), inputs.profile)
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            zion)
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends shellcheck ripgrep
              ;;
            blueprint|eats)
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends shellcheck
              ;;
            lightroom)
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends lua5.4 liblua5.4-dev luarocks
              ;;
          esac

      - name: Install pinned Lightroom tools on cache miss
        if: inputs.profile == 'lightroom'
        env:
          LUACHECK_VERSION: 1.2.0
          STYLUA_VERSION: 2.5.2
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"
          if [[ ! -x "$HOME/.cargo/bin/stylua" ]]; then
            cargo install stylua --version "$STYLUA_VERSION" --locked --root "$HOME/.cargo"
          fi
          if [[ ! -x "$HOME/.luarocks/bin/luacheck" ]]; then
            luarocks --lua-version=5.4 --local install luacheck "$LUACHECK_VERSION"
          fi
          "$HOME/.cargo/bin/stylua" --version
          "$HOME/.luarocks/bin/luacheck" --version

      - name: Install frozen Python dependencies
        if: ${{ ! contains(fromJSON('["control-plane","eats"]'), inputs.profile) }}
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            warren|zion) uv sync --frozen --dev ;;
            homenet) uv sync --locked ;;
            bambu) uv sync --frozen --all-groups ;;
            blueprint) uv sync --frozen --extra dev ;;
            lightroom|contracts) uv sync --frozen ;;
          esac

      - name: Install Blueprint application dependencies
        if: inputs.profile == 'blueprint'
        run: |
          dirs=(shell mike nsa vbr cockpit plan status plate thesis)
          failed=0
          pids=()
          batch_dirs=()
          wait_batch() {
            local index
            for index in "${!pids[@]}"; do
              if ! wait "${pids[$index]}"; then
                failed=1
              fi
              echo "===== npm ci --prefix ${batch_dirs[$index]} ====="
              cat "$RUNNER_TEMP/npm-${batch_dirs[$index]}.log"
            done
            pids=()
            batch_dirs=()
          }
          for dir in "${dirs[@]}"; do
            npm ci --prefix "$dir" >"$RUNNER_TEMP/npm-$dir.log" 2>&1 &
            pids+=("$!")
            batch_dirs+=("$dir")
            if (( ${#pids[@]} == 4 )); then
              wait_batch
            fi
          done
          wait_batch
          exit "$failed"

      - name: Restore Eats node_modules
        if: inputs.profile == 'eats'
        id: eats-node-modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: eats/node_modules
          key: eats-node-modules-${{ runner.os }}-node-24-${{ hashFiles('eats/package-lock.json') }}

      - name: Install Eats dependencies
        if: inputs.profile == 'eats' && steps.eats-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefix eats --prefer-offline --no-audit

      - name: Run canonical repository gate
        if: inputs.profile != 'control-plane'
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            homenet) ./check.sh ;;
            zion) ZION_SKIP_DRIFT=1 ZION_SKIP_WORKSPACE=1 scripts/check.sh ;;
            *) scripts/check.sh ;;
          esac

      - name: Validate authoritative receipt
        if: inputs.profile != 'control-plane'
        run: scripts/check-status.sh --strict

      - name: Validate control-plane JSON and YAML
        if: inputs.profile == 'control-plane'
        run: |
          python3 -m unittest discover -s tests -v
          python3 scripts/embed_pr_validator.py
          python3 scripts/mirror_agents.py --check
          find . -path ./.git -prune -o -name '*.json' -type f -print0 | xargs -0 -r jq empty
          for file in .github/*.yml .github/workflows/*.yml; do
            ruby -e 'require "yaml"; YAML.safe_load(File.read(ARGV[0]), permitted_classes: [], aliases: true)' "$file"
          done

      - name: Audit control-plane workflow security
        if: inputs.profile == 'control-plane'
        run: uvx zizmor==1.28.0 .github/workflows
