name: Reusable repository check

on:
  workflow_call:
    inputs:
      profile:
        description: Maintainer-owned repository execution profile
        type: string
        required: true

permissions:
  contents: read

jobs:
  repo-check:
    name: repo-check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate closed profile
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            control-plane|warren|homenet|bambu|zion|blueprint|lightroom|contracts|eats) ;;
            *) echo "Unsupported centrally owned profile: $PROFILE" >&2; exit 2 ;;
          esac

      - name: Validate agent-ready PR execution brief
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          PR_BODY_JSON: ${{ toJSON(github.event.pull_request.body) }}
        run: |
          # BEGIN GENERATED PR BRIEF VALIDATOR
          python3 - <<'PY'
          #!/usr/bin/env python3
          """Fail closed when a pull request execution brief is missing or empty."""

          from __future__ import annotations

          import json
          import os
          import re
          import sys
          from pathlib import Path


          REQUIRED_HEADINGS = (
              "## Intent",
              "## Behavioral contract",
              "## Impact surface",
              "## Risk hypotheses",
              "## Validation path",
              "## Evidence",
              "## Operational changes",
          )

          SCAFFOLD_LINES = {
              "## Behavioral contract": {"Before:", "After:", "Must remain unchanged:"},
              "## Impact surface": {"Primary:", "Adjacent:"},
              "## Validation path": {"Setup:", "Exercise:", "Expected:"},
              "## Evidence": {
                  "- Tests added or updated:",
                  "- Commands run:",
                  "- Existing validation intentionally not run:",
                  "- Screenshots or traces:",
              },
              "## Operational changes": {
                  "- Config or environment variables:",
                  "- Schema or data migration:",
                  "- Permissions or secrets:",
                  "- Rollout or rollback considerations:",
              },
          }

          PLACEHOLDER_LINES = {"-", "*", "+", "1.", "1)"}


          def _visible_body(body: str) -> str:
              return re.sub(r"<!--.*?-->", "", body, flags=re.DOTALL)


          def _sections(body: str) -> tuple[dict[str, list[str]], list[str]]:
              visible = _visible_body(body)
              lines = visible.splitlines()
              positions: dict[str, int] = {}
              errors: list[str] = []

              for heading in REQUIRED_HEADINGS:
                  matches = [index for index, line in enumerate(lines) if line.strip() == heading]
                  if len(matches) != 1:
                      qualifier = "missing" if not matches else "duplicated"
                      errors.append(f"{qualifier} required heading: {heading}")
                  else:
                      positions[heading] = matches[0]

              if errors:
                  return {}, errors

              observed_order = sorted(REQUIRED_HEADINGS, key=positions.__getitem__)
              if tuple(observed_order) != REQUIRED_HEADINGS:
                  return {}, ["required headings are out of order"]

              sections: dict[str, list[str]] = {}
              for heading in REQUIRED_HEADINGS:
                  start = positions[heading] + 1
                  end = next(
                      (
                          index
                          for index in range(start, len(lines))
                          if lines[index].startswith("## ")
                      ),
                      len(lines),
                  )
                  sections[heading] = lines[start:end]
              return sections, []


          def validate(body: str) -> list[str]:
              sections, errors = _sections(body)
              if errors:
                  return errors

              for heading, lines in sections.items():
                  scaffold = SCAFFOLD_LINES.get(heading, set())
                  substantive = [
                      line.strip()
                      for line in lines
                      if line.strip()
                      and line.strip() not in scaffold
                      and line.strip() not in PLACEHOLDER_LINES
                  ]
                  if not substantive:
                      errors.append(f"empty required section: {heading}")
              return errors


          def _pull_request_body() -> str:
              """Read a multiline-safe PR body from the event or the workflow's JSON transport."""
              if event_path := os.environ.get("GITHUB_EVENT_PATH"):
                  payload = json.loads(Path(event_path).read_text(encoding="utf-8"))
                  pull_request = payload.get("pull_request")
                  if isinstance(pull_request, dict) and isinstance(pull_request.get("body"), str):
                      return pull_request["body"]
              if encoded_body := os.environ.get("PR_BODY_JSON"):
                  body = json.loads(encoded_body)
                  if not isinstance(body, str):
                      raise ValueError("PR_BODY_JSON must decode to a string")
                  return body
              return os.environ.get("PR_BODY", "")


          def main() -> int:
              errors = validate(_pull_request_body())
              if not errors:
                  print("Agent-ready PR execution brief: PASS")
                  return 0
              for error in errors:
                  print(error, file=sys.stderr)
              return 2


          if __name__ == "__main__":
              raise SystemExit(main())
          PY
          # END GENERATED PR BRIEF VALIDATOR

      - name: Set up uv and Python
        if: inputs.profile != 'control-plane'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ inputs.profile == 'bambu' && '3.12' || '3.13' }}
          enable-cache: true

      - name: Set up uv for control-plane audit
        if: inputs.profile == 'control-plane'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: false

      - name: Set up Node
        if: contains(fromJSON('["homenet","blueprint","lightroom","eats"]'), inputs.profile)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.profile == 'blueprint' && '25' || '24' }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            eats/package-lock.json
            shell/package-lock.json
            mike/package-lock.json
            nsa/package-lock.json
            vbr/package-lock.json
            cockpit/package-lock.json
            plan/package-lock.json
            status/package-lock.json
            plate/package-lock.json
            thesis/package-lock.json
            vendor/automaat-lightroom-mcp/server/package-lock.json

      - name: Restore pinned Lightroom tools
        if: inputs.profile == 'lightroom'
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/bin/stylua
            ~/.luarocks
          key: lightroom-tools-${{ runner.os }}-lua-5.4-stylua-2.5.2-luacheck-1.2.0

      - name: Install profile system tools
        if: contains(fromJSON('["zion","blueprint","lightroom","eats"]'), inputs.profile)
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            zion)
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends shellcheck ripgrep
              ;;
            blueprint|eats)
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends shellcheck
              ;;
            lightroom)
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends lua5.4 liblua5.4-dev luarocks libvips-dev
              ;;
          esac

      - name: Install pinned Lightroom tools on cache miss
        if: inputs.profile == 'lightroom'
        env:
          LUACHECK_VERSION: 1.2.0
          STYLUA_VERSION: 2.5.2
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"
          if [[ ! -x "$HOME/.cargo/bin/stylua" ]]; then
            cargo install stylua --version "$STYLUA_VERSION" --locked --root "$HOME/.cargo"
          fi
          if [[ ! -x "$HOME/.luarocks/bin/luacheck" ]]; then
            luarocks --lua-version=5.4 --local install luacheck "$LUACHECK_VERSION"
          fi
          "$HOME/.cargo/bin/stylua" --version
          "$HOME/.luarocks/bin/luacheck" --version

      - name: Install frozen Python dependencies
        if: ${{ ! contains(fromJSON('["control-plane","eats"]'), inputs.profile) }}
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            warren|zion) uv sync --frozen --dev ;;
            homenet) uv sync --locked ;;
            bambu) uv sync --frozen --all-groups ;;
            blueprint) uv sync --frozen --extra dev ;;
            lightroom|contracts) uv sync --frozen ;;
          esac

      - name: Install Blueprint application dependencies
        if: inputs.profile == 'blueprint'
        run: |
          dirs=(shell mike nsa vbr cockpit plan status plate thesis)
          failed=0
          pids=()
          batch_dirs=()
          wait_batch() {
            local index
            for index in "${!pids[@]}"; do
              if ! wait "${pids[$index]}"; then
                failed=1
              fi
              echo "===== npm ci --prefix ${batch_dirs[$index]} ====="
              cat "$RUNNER_TEMP/npm-${batch_dirs[$index]}.log"
            done
            pids=()
            batch_dirs=()
          }
          for dir in "${dirs[@]}"; do
            npm ci --prefix "$dir" >"$RUNNER_TEMP/npm-$dir.log" 2>&1 &
            pids+=("$!")
            batch_dirs+=("$dir")
            if (( ${#pids[@]} == 4 )); then
              wait_batch
            fi
          done
          wait_batch
          exit "$failed"

      - name: Restore Eats node_modules
        if: inputs.profile == 'eats'
        id: eats-node-modules
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: eats/node_modules
          key: eats-node-modules-${{ runner.os }}-node-24-${{ hashFiles('eats/package-lock.json') }}

      - name: Install Eats dependencies
        if: inputs.profile == 'eats' && steps.eats-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefix eats --prefer-offline --no-audit

      - name: Run canonical repository gate
        if: inputs.profile != 'control-plane'
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            homenet) ./check.sh ;;
            zion) ZION_SKIP_DRIFT=1 ZION_SKIP_WORKSPACE=1 scripts/check.sh ;;
            *) scripts/check.sh ;;
          esac

      - name: Validate authoritative receipt
        if: inputs.profile != 'control-plane'
        run: scripts/check-status.sh --strict

      - name: Validate control-plane JSON and YAML
        if: inputs.profile == 'control-plane'
        run: |
          python3 -m unittest discover -s tests -v
          python3 scripts/embed_pr_validator.py
          python3 scripts/mirror_agents.py --check
          find . -path ./.git -prune -o -name '*.json' -type f -print0 | xargs -0 -r jq empty
          for file in .github/*.yml .github/workflows/*.yml; do
            ruby -e 'require "yaml"; YAML.safe_load(File.read(ARGV[0]), permitted_classes: [], aliases: true)' "$file"
          done

      - name: Audit control-plane workflow security
        if: inputs.profile == 'control-plane'
        run: uvx zizmor==1.28.0 .github/workflows
