name: Reusable repository check

on:
  workflow_call:
    inputs:
      profile:
        description: Maintainer-owned repository execution profile
        type: string
        required: true

permissions:
  contents: read

jobs:
  repo-check:
    name: repo-check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate closed profile
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            control-plane|warren|homenet|bambu|zion|blueprint|lightroom|contracts|eats) ;;
            *) echo "Unsupported centrally owned profile: $PROFILE" >&2; exit 2 ;;
          esac

      - name: Validate agent-ready PR execution brief
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          required=(
            "## Intent"
            "## Behavioral contract"
            "## Impact surface"
            "## Risk hypotheses"
            "## Validation path"
            "## Evidence"
            "## Operational changes"
          )
          for heading in "${required[@]}"; do
            if ! grep -Fqx "$heading" <<<"$PR_BODY"; then
              echo "Missing required PR execution-brief heading: $heading" >&2
              exit 2
            fi
          done

      - name: Set up uv and Python
        if: inputs.profile != 'control-plane'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ inputs.profile == 'bambu' && '3.12' || '3.13' }}
          enable-cache: true

      - name: Set up uv for control-plane audit
        if: inputs.profile == 'control-plane'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: false

      - name: Set up Node
        if: contains(fromJSON('["homenet","blueprint","lightroom","eats"]'), inputs.profile)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.profile == 'blueprint' && '25' || '24' }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            eats/package-lock.json
            shell/package-lock.json
            mike/package-lock.json
            nsa/package-lock.json
            vbr/package-lock.json
            cockpit/package-lock.json
            plan/package-lock.json
            status/package-lock.json
            plate/package-lock.json
            thesis/package-lock.json
            vendor/automaat-lightroom-mcp/server/package-lock.json

      - name: Restore pinned Lightroom tools
        if: inputs.profile == 'lightroom'
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/bin/stylua
            ~/.luarocks
          key: lightroom-tools-${{ runner.os }}-lua-5.4-stylua-2.5.2-luacheck-1.2.0

      - name: Install profile system tools
        if: contains(fromJSON('["zion","blueprint","lightroom","eats"]'), inputs.profile)
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            zion)
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends shellcheck ripgrep
              ;;
            blueprint|eats)
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends shellcheck
              ;;
            lightroom)
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends lua5.4 liblua5.4-dev luarocks libvips-dev
              ;;
          esac

      - name: Install pinned Lightroom tools on cache miss
        if: inputs.profile == 'lightroom'
        env:
          LUACHECK_VERSION: 1.2.0
          STYLUA_VERSION: 2.5.2
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"
          if [[ ! -x "$HOME/.cargo/bin/stylua" ]]; then
            cargo install stylua --version "$STYLUA_VERSION" --locked --root "$HOME/.cargo"
          fi
          if [[ ! -x "$HOME/.luarocks/bin/luacheck" ]]; then
            luarocks --lua-version=5.4 --local install luacheck "$LUACHECK_VERSION"
          fi
          "$HOME/.cargo/bin/stylua" --version
          "$HOME/.luarocks/bin/luacheck" --version

      - name: Install frozen Python dependencies
        if: ${{ ! contains(fromJSON('["control-plane","eats"]'), inputs.profile) }}
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            warren|zion) uv sync --frozen --dev ;;
            homenet) uv sync --locked ;;
            bambu) uv sync --frozen --all-groups ;;
            blueprint) uv sync --frozen --extra dev ;;
            lightroom|contracts) uv sync --frozen ;;
          esac

      - name: Install Blueprint application dependencies
        if: inputs.profile == 'blueprint'
        run: |
          dirs=(shell mike nsa vbr cockpit plan status plate thesis)
          failed=0
          pids=()
          batch_dirs=()
          wait_batch() {
            local index
            for index in "${!pids[@]}"; do
              if ! wait "${pids[$index]}"; then
                failed=1
              fi
              echo "===== npm ci --prefix ${batch_dirs[$index]} ====="
              cat "$RUNNER_TEMP/npm-${batch_dirs[$index]}.log"
            done
            pids=()
            batch_dirs=()
          }
          for dir in "${dirs[@]}"; do
            npm ci --prefix "$dir" >"$RUNNER_TEMP/npm-$dir.log" 2>&1 &
            pids+=("$!")
            batch_dirs+=("$dir")
            if (( ${#pids[@]} == 4 )); then
              wait_batch
            fi
          done
          wait_batch
          exit "$failed"

      - name: Restore Eats node_modules
        if: inputs.profile == 'eats'
        id: eats-node-modules
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: eats/node_modules
          key: eats-node-modules-${{ runner.os }}-node-24-${{ hashFiles('eats/package-lock.json') }}

      - name: Install Eats dependencies
        if: inputs.profile == 'eats' && steps.eats-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefix eats --prefer-offline --no-audit

      - name: Run canonical repository gate
        if: inputs.profile != 'control-plane'
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          case "$PROFILE" in
            homenet) ./check.sh ;;
            zion) ZION_SKIP_DRIFT=1 ZION_SKIP_WORKSPACE=1 scripts/check.sh ;;
            *) scripts/check.sh ;;
          esac

      - name: Validate authoritative receipt
        if: inputs.profile != 'control-plane'
        run: scripts/check-status.sh --strict

      - name: Validate control-plane JSON and YAML
        if: inputs.profile == 'control-plane'
        run: |
          python3 scripts/mirror_agents.py --check
          find . -path ./.git -prune -o -name '*.json' -type f -print0 | xargs -0 -r jq empty
          for file in .github/*.yml .github/workflows/*.yml; do
            ruby -e 'require "yaml"; YAML.safe_load(File.read(ARGV[0]), permitted_classes: [], aliases: true)' "$file"
          done

      - name: Audit control-plane workflow security
        if: inputs.profile == 'control-plane'
        run: uvx zizmor==1.28.0 .github/workflows
