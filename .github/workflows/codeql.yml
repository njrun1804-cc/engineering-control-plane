name: Reusable CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: Comma-separated CodeQL language identifiers
        type: string
        required: true

permissions:
  contents: read

jobs:
  codeql:
    name: codeql
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload CodeQL SARIF results to the security tab
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@adfda868f108ac4222129de456ea554034a27db7 # v4
        with:
          languages: ${{ inputs.languages }}
      - name: Analyze
        uses: github/codeql-action/analyze@adfda868f108ac4222129de456ea554034a27db7 # v4
